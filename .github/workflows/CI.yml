name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          # NGCLearn inherits NGCSimLib's Julia 1.12+ floor (uses `OncePerProcess`).
          - '1.12'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      # NGCLearn depends on NGCSimLib via a `[sources]` path dev-link
      # (`../NGCSimLib`). CI checks out only this repo, so clone the sibling
      # next to it before instantiation. NGCSimLib is not yet registered;
      # revisit (registry / git-rev source) once it is published.
      - name: Clone NGCSimLib (path [sources] dependency)
        run: git clone --depth 1 https://github.com/CognitiveSubstratesAI/NGCSimLib.git ../NGCSimLib
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          # Skip the Reactant/XLA JIT integration test on every-push CI: each
          # `@compile` is a full XLA compilation, and tracing the whole zoo runs
          # ~30+ min — past this job's timeout. The 299 correctness tests still
          # run here; JIT equivalence is verified on demand (locally, or the
          # `jit` workflow_dispatch job below). See test/test_jit_integration.jl.
          NGCLEARN_SKIP_JIT: '1'

  jit:
    name: JIT integration (Reactant, on-demand)
    # Heavy XLA tracing — only on manual dispatch, not every push.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Clone NGCSimLib (path [sources] dependency)
        run: git clone --depth 1 https://github.com/CognitiveSubstratesAI/NGCSimLib.git ../NGCSimLib
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          NGCLEARN_SKIP_JIT: '0'

  format:
    name: Format (Blue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Check formatting
        run: |
          julia -e 'using Pkg; Pkg.add("JuliaFormatter")'
          julia -e 'using JuliaFormatter; format(".", verbose=true) || error("format check failed; run julia -e \"using JuliaFormatter; format(\\\".\\\")\" locally and commit the changes")'
